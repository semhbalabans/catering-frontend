<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catering | Lezzet Sanatı</title>

    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        turuncu: '#FF6F00',
                        gulKurusu: '#E8D4D6',
                        tasGrisi: '#B8B2A7',
                        adacayi: '#A8B8A2'
                    }
                }
            }
        }
    </script>

    <style>
        /* KAYDIRMA ÇUBUĞU YOK */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* --- PREMİUM / YUMUŞATILMIŞ ANİMASYONLAR --- */

        /* 1. Ana Başlık Görünümü */
        .anim-fade-text {
            opacity: 0;
            transition: opacity 2.5s ease-out;
        }

        /* 2. Fotoğraf Animasyonu: Blur tamamen kaldırıldı, sadece şeffaflık değişir */
        .anim-fade-image {
            opacity: 0;
            transition: opacity 2.0s ease-out;
        }

        /* 3. Blokların Yavaşça Kayması */
        .anim-slide-card {
            transform: translateX(-30px);
            opacity: 0;
            transition: transform 2.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 2.5s ease-out;
        }
        .anim-slide-up-solid {
            transform: translateY(40px);
            opacity: 0;
            transition: transform 2.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s, opacity 2.5s ease-out 0.3s;
        }

        /* 4. Kelime Kelime Çıkış İçin CSS Altyapısı */
        .word-wrap span {
            display: inline-block;
            opacity: 0;
            transform: translateX(-10px);
            transition: opacity 1.5s ease-out, transform 1.5s ease-out;
        }

        /* --- EKRANA GİRDİĞİNDE TETİKLENENLER --- */
        .ekranda .anim-fade-text {
            opacity: 1;
        }
        .ekranda .anim-fade-image {
            opacity: 1;
        }
        .ekranda .anim-slide-card {
            transform: translateX(0);
            opacity: 1;
        }
        .ekranda .anim-slide-up-solid {
            transform: translateY(0);
            opacity: 1;
        }
        .ekranda .word-wrap span {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
</head>

<body class="font-sans antialiased text-gray-800 m-0 overflow-hidden h-screen bg-gray-100" onload="sayfaYuklendi()">

    <main class="h-screen w-full overflow-y-auto snap-y snap-mandatory scroll-smooth no-scrollbar">

        <!-- SECTION 1: HOŞGELDİNİZ -->
        <section id="hosgeldiniz" class="min-h-screen w-full snap-start bg-gulKurusu flex flex-col justify-center items-center py-20 px-8 text-center relative overflow-hidden gorsel-section">
            <div class="absolute top-6 right-8 flex gap-4 font-bold text-gray-700 z-10">
                <button onclick="diliDegistir('tr')" class="hover:text-turuncu transition">TR</button>
                <button onclick="diliDegistir('en')" class="hover:text-turuncu transition">EN</button>
                <button onclick="diliDegistir('nl')" class="hover:text-turuncu transition">NL</button>
            </div>

            <h1 id="dinamik_ana_baslik" class="anim-fade-text text-5xl md:text-7xl font-bold mb-6 text-gray-900 mt-12">Yükleniyor...</h1>
            <p id="dinamik_alt_baslik" class="word-wrap text-xl md:text-2xl mb-8 max-w-2xl">Yükleniyor...</p>

            <div class="anim-fade-image relative w-full max-w-4xl h-64 md:h-96 group">
                <button onclick="sliderKaydir(-1)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white text-turuncu rounded-full w-12 h-12 flex items-center justify-center z-20 shadow-lg text-xl font-bold transition">❮</button>
                <div id="sliderAlani" class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar w-full h-full rounded-2xl shadow-xl relative z-10"></div>
                <button onclick="sliderKaydir(1)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white text-turuncu rounded-full w-12 h-12 flex items-center justify-center z-20 shadow-lg text-xl font-bold transition">❯</button>
            </div>

            <a href="#hakkimda" data-i18n="asagi_kaydir" class="mt-8 text-turuncu font-bold text-lg animate-bounce">Aşağı Kaydır ↓</a>
        </section>

        <!-- SECTION 2: HAKKIMDA -->
        <section id="hakkimda" class="min-h-screen w-full snap-start bg-tasGrisi flex flex-col justify-center items-center py-20 px-8 text-center gorsel-section overflow-hidden">
            <h2 data-i18n="ben_kimim" class="anim-fade-text text-4xl md:text-5xl font-bold mb-8 text-white">Ben Kimim?</h2>

            <p id="dinamik_hakkimda" class="word-wrap text-lg md:text-xl max-w-3xl leading-relaxed text-gray-100">Yükleniyor...</p>
            <div id="bizKimizFotoAlani" class="anim-fade-image mt-12 max-w-3xl w-full"></div>
        </section>

        <!-- SECTION 3: MENÜ -->
        <section id="menu" class="min-h-screen w-full snap-start bg-adacayi flex flex-col justify-start items-center py-20 px-8 gorsel-section overflow-hidden">
            <h2 data-i18n="menumuz" class="anim-fade-text text-4xl md:text-5xl font-bold mb-12 text-white">Menümüz</h2>
            <div id="dinamikMenuAlani" class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-5xl pb-12"></div>
        </section>

        <!-- SECTION 4: SİPARİŞ -->
        <section id="siparis" class="min-h-screen w-full snap-start bg-turuncu flex flex-col justify-start items-center py-20 px-8 gorsel-section overflow-hidden">
            <h2 data-i18n="siparis_olustur" class="anim-fade-text text-4xl md:text-5xl font-bold mb-8 text-white">Sipariş Oluştur</h2>

            <form id="siparisFormu" class="anim-slide-up-solid w-full max-w-2xl bg-white p-8 rounded-2xl shadow-2xl flex flex-col gap-4">
                <div><label data-i18n="isim_etiket" class="block font-bold mb-2">İsim Soyisim</label><input type="text" id="isim" data-i18n-ph="isim_ph" class="w-full p-3 border rounded-lg"></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label data-i18n="telefon_etiket" class="block font-bold mb-2">Telefon</label><input type="tel" id="telefon" data-i18n-ph="telefon_ph" class="w-full p-3 border rounded-lg"></div>
                    <div><label data-i18n="eposta_etiket" class="block font-bold mb-2">E-posta</label><input type="email" id="eposta" data-i18n-ph="eposta_ph" class="w-full p-3 border rounded-lg"></div>
                </div>
                <div><label data-i18n="adres_etiket" class="block font-bold mb-2">Adres</label><textarea id="adres" data-i18n-ph="adres_ph" rows="2" class="w-full p-3 border rounded-lg"></textarea></div>
                <div><label data-i18n="icerik_etiket" class="block font-bold mb-2">Sipariş İçeriği</label><textarea id="siparis_icerigi" data-i18n-ph="icerik_ph" rows="4" class="w-full p-3 border rounded-lg"></textarea></div>
                <button type="button" onclick="siparisiGonder()" data-i18n="gonder_buton" class="mt-4 bg-turuncu text-white font-bold py-4 rounded-lg hover:bg-orange-600">Siparişi Gönder</button>
            </form>

            <div class="mt-12 text-center text-white z-10 pb-12">
                <h3 data-i18n="iletisim" class="text-2xl font-bold mb-2">İletişim</h3>
                <p class="text-xl font-semibold">Aslıhan Şahin</p>
                <p class="text-lg mt-1 font-bold"> <a id="dinamik_telefon" href="#" class="hover:text-gray-200 underline decoration-dashed transition">Yükleniyor...</a></p>
            </div>
        </section>

    </main>

    <script>
        const API_URL = "https://catering-api-hhbx.onrender.com";
        let aktifDil = 'nl';
        let tumMenuler = [];
        let siteAyarlari = {};

        const ceviriler = {
            tr: {
                asagi_kaydir: "Aşağı Kaydır ↓",
                ben_kimim: "Ben Kimim?",
                menumuz: "Menümüz",
                siparis_olustur: "Sipariş Oluştur",
                isim_etiket: "İsim Soyisim",
                isim_ph: "Adınız Soyadınız",
                telefon_etiket: "Telefon",
                telefon_ph: "+31 6 XXX",
                eposta_etiket: "E-posta",
                eposta_ph: "ornek@mail.com",
                adres_etiket: "Adres",
                adres_ph: "Teslimat Adresi",
                icerik_etiket: "Sipariş İçeriği",
                icerik_ph: "Menü seçimlerinizi yazınız...",
                gonder_buton: "Siparişi Gönder",
                iletisim: "İletişim",
                uyari_bos: "Lütfen alanları doldurunuz!",
                uyari_basarili: "Siparişiniz alındı!"
            },
            en: {
                asagi_kaydir: "Scroll Down ↓",
                ben_kimim: "Who Am I?",
                menumuz: "Our Menu",
                siparis_olustur: "Create Order",
                isim_etiket: "Full Name",
                isim_ph: "Your Name",
                telefon_etiket: "Phone",
                telefon_ph: "+31 6 XXX",
                eposta_etiket: "Email",
                eposta_ph: "example@mail.com",
                adres_etiket: "Address",
                adres_ph: "Delivery Address",
                icerik_etiket: "Order Details",
                icerik_ph: "Write your menu selections...",
                gonder_buton: "Send Order",
                iletisim: "Contact",
                uyari_bos: "Please fill the fields!",
                uyari_basarili: "Order received!"
            },
            nl: {
                asagi_kaydir: "Scroll naar beneden ↓",
                ben_kimim: "Wie Ben Ik?",
                menumuz: "Ons Menu",
                siparis_olustur: "Bestelling Plaatsen",
                isim_etiket: "Volledige Naam",
                isim_ph: "Uw Voor- en Achternaam",
                telefon_etiket: "Telefoonnummer",
                telefon_ph: "+31 6 XXX",
                eposta_etiket: "E-mailadres",
                eposta_ph: "voorbeeld@mail.com",
                adres_etiket: "Adres",
                adres_ph: "Bezorgadres",
                icerik_etiket: "Bestelgegevens",
                icerik_ph: "Schrijf hier uw menukeuzes...",
                gonder_buton: "Bestelling Verzenden",
                iletisim: "Contact",
                uyari_bos: "Vul alstublieft alle velden in!",
                uyari_basarili: "Uw bestelling is succesvol ontvangen!"
            }
        };

        async function sayfaYuklendi() {
            try {
                const [menuRes, fotoRes, ayarRes] = await Promise.all([
                    fetch(`${API_URL}/menuler`),
                    fetch(`${API_URL}/fotograflar`),
                    fetch(`${API_URL}/ayarlar`)
                ]);
                tumMenuler = await menuRes.json();
                siteAyarlari = await ayarRes.json();
                const fotolar = await fotoRes.json();

                sliderCiz(fotolar.filter(f => f.bolum === "slider"));
                bizKimizFotolariCiz(fotolar.filter(f => f.bolum === "biz_kimiz"));

                diliDegistir('nl');
                animasyonGozlemcisiniBaslat();
            } catch (e) {
                // Hata durumunda sessiz kal
            }
        }

        function animasyonGozlemcisiniBaslat() {
            const gozlemci = new IntersectionObserver((girdiler) => {
                girdiler.forEach(girdi => {
                    if (girdi.isIntersecting) girdi.target.classList.add('ekranda');
                    else girdi.target.classList.remove('ekranda');
                });
            }, { threshold: 0.3 });
            document.querySelectorAll('.gorsel-section').forEach(sec => gozlemci.observe(sec));
        }

        function sliderKaydir(yon) {
            document.getElementById("sliderAlani").scrollBy({
                left: yon * document.getElementById("sliderAlani").clientWidth,
                behavior: 'smooth'
            });
        }

        // GÜNCELLENMİŞ: object-contain ile fotoğraflar tam görünür, kırpılmaz
        function sliderCiz(fotolar) {
            const alan = document.getElementById("sliderAlani");
            if (fotolar.length === 0) return alan.innerHTML =
                `<div class="w-full h-full flex items-center justify-center text-gray-500 snap-center shrink-0">Slider Görseli Yok</div>`;
            alan.innerHTML = "";
            fotolar.forEach(f => alan.innerHTML +=
                `<img src="${f.url}" class="snap-center shrink-0 w-full h-full object-contain">`);
        }

        // GÜNCELLENMİŞ: object-contain kullanılarak oran korunur
        function bizKimizFotolariCiz(fotolar) {
            const alan = document.getElementById("bizKimizFotoAlani");
            if (fotolar.length > 0) {
                alan.innerHTML =
                    `<img src="${fotolar[0].url}" class="w-full h-auto rounded-2xl shadow-xl object-contain">`;
            }
        }

        function menuleriCiz() {
            const alan = document.getElementById("dinamikMenuAlani");
            if (tumMenuler.length === 0) return alan.innerHTML =
                `<p class="text-white text-center w-full col-span-3">Henüz menü eklenmemiş.</p>`;
            alan.innerHTML = "";
            tumMenuler.forEach((m, index) => {
                const baslik = m[`baslik_${aktifDil}`];
                const icerik = m[`icerik_${aktifDil}`];
                if (!baslik || !icerik) return;
                alan.innerHTML += `
                        <div class="anim-slide-card bg-white p-6 rounded-xl shadow-lg" style="transition-delay: ${index * 0.3}s">
                            <h3 class="text-2xl font-bold text-turuncu mb-4">${baslik}</h3>
                            <ul class="space-y-2">${icerik.map(y => `<li>${y}</li>`).join('')}</ul>
                        </div>`;
            });
        }

        function diliDegistir(dilKodu) {
            aktifDil = dilKodu;
            const s = ceviriler[dilKodu];

            document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = s[el.getAttribute('data-i18n')]);
            document.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = s[el.getAttribute('data-i18n-ph')]);

            document.getElementById('dinamik_ana_baslik').textContent = siteAyarlari[`ana_baslik_${dilKodu}`] ||
                "Başlık Yükleniyor...";

            // Alt başlık – kelime kelime
            const altBaslikMetin = siteAyarlari[`alt_baslik_${dilKodu}`] || "Alt başlık yükleniyor...";
            const altBaslikKelimeler = altBaslikMetin.split(" ");
            const altBaslikHTML = altBaslikKelimeler.map((kelime, index) =>
                `<span style="transition-delay: ${0.5 + (index * 0.08)}s">${kelime}</span> `
            ).join("");
            document.getElementById('dinamik_alt_baslik').innerHTML = altBaslikHTML;

            // Hakkımda – kelime kelime
            const hakkimdaMetin = siteAyarlari[`hakkimda_${dilKodu}`] || "Metin yükleniyor...";
            const kelimeler = hakkimdaMetin.split(" ");
            const kelimeHTML = kelimeler.map((kelime, index) =>
                `<span style="transition-delay: ${0.3 + (index * 0.08)}s">${kelime}</span> `
            ).join("");
            document.getElementById('dinamik_hakkimda').innerHTML = kelimeHTML;

            const num = siteAyarlari.telefon || "+31 6 00000000";
            document.getElementById('dinamik_telefon').textContent = num;
            document.getElementById('dinamik_telefon').href = `tel:${num.replace(/\s+/g, '')}`;

            menuleriCiz();
        }

        async function siparisiGonder() {
            const pk = {
                isim_soyisim: document.getElementById("isim").value,
                telefon: document.getElementById("telefon").value,
                eposta: document.getElementById("eposta").value,
                adres: document.getElementById("adres").value,
                siparis_icerigi: document.getElementById("siparis_icerigi").value
            };
            if (!pk.isim_soyisim || !pk.telefon || !pk.siparis_icerigi) return alert(ceviriler[aktifDil].uyari_bos);
            const yanit = await fetch(`${API_URL}/siparisler`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(pk)
            });
            if (yanit.ok) {
                alert(ceviriler[aktifDil].uyari_basarili);
                document.getElementById("siparisFormu").reset();
            }
        }
    </script>

</body>
</html>
